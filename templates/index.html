<!DOCTYPE html>
<html>
<head>
    <title>AI Video Analyzer</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .highlight { background: yellow; font-weight: bold; }
        .timestamp { color: gray; margin-right: 10px; }
    </style>
</head>
<body>

<h2>Upload Video</h2>

<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file">
    <button type="submit">Analyze</button>
</form>

<hr>

{% if results %}
    <h3>Transcript</h3>
    <ul>
    {% for item in results %}
        <li class="{{ 'highlight' if item.highlight else '' }}">
            <span class="timestamp">[{{ item.start }}]</span>
            {{ item.text }}
        </li>
    {% endfor %}
    </ul>
{% endif %}

</body>
</html>
